<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Vishvamitra</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    :root {
      --primary-green: #14a800;
      --secondary-accent: #007bff;
      --text-dark: #333;
      --text-light: #555;
      --bg-light: #f9f9f9;
      --card-bg: white;
    }
    body { font-family: 'Poppins', sans-serif; margin: 0; background-color: var(--bg-light); }
    .dashboard { max-width: 1100px; margin: 40px auto; padding: 0 1rem; }
    .welcome { font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; }
    .kpi-overview { display: grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:20px; margin-bottom:30px; }
    .kpi-card { background:#fff; border-radius:10px; padding:1.5rem; border-left:5px solid var(--primary-green); }
    .kpi-card h4 { margin:0; font-size:.9rem; color:var(--text-light); }
    .kpi-value { font-size:2.2rem; font-weight:700; }
    .pending-kpi { border-left-color:#ffc107; }
    .dashboard-buttons { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:2rem; }
    .dashboard-buttons button { padding:.8rem 1.8rem; border:none; border-radius:8px; background:var(--primary-green); color:#fff; font-weight:600; cursor:pointer; }
    .listings { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; }
    .listing-card { background:#fff; padding:1.5rem; border-radius:10px; }
    .status-tag { padding:4px 10px; border-radius:5px; font-size:.85rem; }
    .status-active { background:#d4edda; color:#155724; }
    .status-review { background:#fff3cd; color:#856404; }
    .card-actions button { margin-right:10px; padding:8px 15px; border:none; border-radius:5px; color:#fff; cursor:pointer; }
    .edit-btn { background:#007bff; }
    .delete-btn { background:#dc3545; }
    .promote-btn { background:#f0ad4e; }
    .footer { text-align:center; padding:1.5rem; background:#fff; margin-top:60px; }
  </style>

</head>

<body>

<header>
<nav class="navbar">
  <div class="logo">Vishvamitra</div>
  <div class="menu-toggle" id="mobile-menu">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </div>
  <ul class="nav-list">
    <li><a href="index.html" class="nav-link">Home</a></li>
    <li><a href="services.html" class="nav-link">Services</a></li>
    <li><a href="dashboard.html" id="dashboardLink" class="nav-link" style="display:none;">Dashboard</a></li>
    <li><a href="admin.html" id="adminLink" class="nav-link" style="display:none;">Admin</a></li>
    <li><a href="contact.html" class="nav-link">Contact</a></li>
    <li><a href="login.html" id="loginLink" class="nav-link">Login</a></li>
    <li><a href="#" id="logoutLink" class="nav-link" style="display:none;">Logout</a></li>
  </ul>
</nav>
</header>

<div class="dashboard">
  <div class="welcome">Welcome, <span id="user-name">Loading...</span> 👋</div>

  <div class="kpi-overview">

  <div class="kpi-card">
    <h4>Total Listings</h4>
    <div class="kpi-value" id="total-listings">0</div>
  </div>

  <div class="kpi-card">
    <h4>Active Listings</h4>
    <div class="kpi-value" id="active-listings">0</div>
  </div>

  <div class="kpi-card">
    <h4>Listings in Review</h4>
    <div class="kpi-value" id="review-listings">0</div>
  </div>

</div>

  <div class="dashboard-buttons">
    <button onclick="location.href='add-listing.html'">➕ Add New Listing</button>
    <button onclick="location.href='index.html'">🏠 Back to Home</button>
  </div>

  <h2 style="margin:30px 0 15px;">Your Listings</h2>
  <div class="listings" id="listings-container"></div>
</div>

<footer class="footer">
  © 2025 Vishvamitra. All rights reserved.
</footer>

<script>
  const mobileMenu = document.getElementById('mobile-menu');
  const navList = document.querySelector('.nav-list');
  mobileMenu?.addEventListener('click', () => navList.classList.toggle('active'));
</script>

<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
  import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD4pVmGDasFAADaiYctht55jE2NvIpHSto",
    authDomain: "vishvamitra-79627.firebaseapp.com",
    projectId: "vishvamitra-79627",
    storageBucket: "vishvamitra-79627.firebasestorage.app",
    messagingSenderId: "436224322843",
    appId: "1:436224322843:web:a4d074a5eb8ad99866f7be"
  };

  const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, (user) => {
    if (!user) return; // auth.js handles redirect

    const name = user.displayName || user.email.split("@")[0];
    document.getElementById("user-name").innerText = name;

    const listingsRef = query(
      collection(db, "listings"),
      where("vendorId", "==", user.uid)
    );

    onSnapshot(listingsRef, snap => {

  const container = document.getElementById("listings-container");

  // show skeleton loading first
  container.innerHTML = `
  <div class="skeleton-card">
    <div class="skeleton-line skeleton-title"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
  </div>

  <div class="skeleton-card">
    <div class="skeleton-line skeleton-title"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
  </div>
  `;

  setTimeout(() => {

    container.innerHTML = "";

    if (snap.empty) {
      container.innerHTML = `
        <div style="text-align:center;padding:40px;">
          <h3>📭 No Listings Yet</h3>
          <p>Create your first listing to appear here.</p>
          <button onclick="location.href='add-listing.html'">
            ➕ Add Listing
          </button>
        </div>
      `;
      return;
    }

    let total = 0, review = 0, active = 0;

    snap.forEach(d => {

      const l = d.data();

      const statusClass =
        l.status === "active"
          ? "status-active"
          : l.status === "pending"
          ? "status-review"
          : "";

      total++;
      if (l.status === "pending") review++;
      if (l.status === "active") active++;

      const card = document.createElement("div");
      card.className = "listing-card";

      card.innerHTML = `
        <h3>${l.name}</h3>
        <p>Category: ${l.category}</p>

        <p>
          <span style="background:#eee;padding:3px 8px;border-radius:6px;font-size:.85rem">
            ${(l.type || "free").toUpperCase()}
          </span>
        </p>

        <p>Location: ${l.location}</p>

        <p>Status:
          <span class="status-tag ${statusClass}">
            ${l.status}
          </span>
        </p>

        <div class="card-actions">
          <button class="edit-btn" data-id="${d.id}">Edit</button>
          <button class="delete-btn" data-id="${d.id}">Delete</button>
          ${
            l.status === "pending"
              ? `<button class="promote-btn" data-id="${d.id}">Promote</button>`
              : ""
          }
        </div>
      `;

      container.appendChild(card);

    });

    document.getElementById("total-listings").innerText = total;
    document.getElementById("active-listings").innerText = active;
    document.getElementById("review-listings").innerText = review;
      }, 300);
    });
  });

  // BUTTON HANDLER (ADD THIS HERE)
const container = document.getElementById("listings-container");

container.addEventListener("click", async (e) => {

  const btn = e.target;
  const id = btn.dataset.id;

  if (!id) return;

  if (btn.classList.contains("edit-btn")) {
    window.location.href = `add-listing.html?editId=${id}`;
  }

  if (btn.classList.contains("delete-btn")) {
    const ok = confirm("Delete this listing?");
    if (!ok) return;

    await deleteDoc(doc(db, "listings", id));
  }

  if (btn.classList.contains("promote-btn")) {
    await updateDoc(doc(db, "listings", id), {
      status: "active"
    });
  }

});
</script>

<script>
  const links = document.querySelectorAll("a[href$='.html']");
  links.forEach(link => {
    link.addEventListener("mouseenter", () => {
      const prefetch = document.createElement("link");
      prefetch.rel = "prefetch";
      prefetch.href = link.href;
      document.head.appendChild(prefetch);
    });
  });
</script>


<!-- 🔑 SINGLE AUTH CONTROLLER -->
<script type="module" src="auth.js"></script>

</body>
</html>

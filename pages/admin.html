<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Vishvamitra</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
<!-- Auth Guard: must be admin -->
<script type="module">
  import { protectAdminPage } from "../scripts/authGuard.js";
  protectAdminPage();
</script>

<!-- Mobile top bar -->
<div class="mobile-header" id="mobileHeader">
  <button id="menuBtn" aria-label="Open sidebar">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <span>Admin Panel</span>
</div>

<div id="adminWrap" style="visibility:hidden;">
  <div class="admin-container">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar" aria-label="Admin navigation">
      <button class="close-sidebar" id="closeSidebar" aria-label="Close sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2>Admin</h2>
      <a data-section="listings" class="active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
        Listings
      </a>
      <a data-section="users">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </a>
      <a href="index.html">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Site
      </a>
    </nav>

    <!-- Main -->
    <main class="main-content">
      <h1>Admin Dashboard</h1>

      <!-- KPIs -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <h4>Total Listings</h4>
          <div class="kpi-value" id="kpiTotal">—</div>
        </div>
        <div class="kpi-card yellow">
          <h4>Pending Review</h4>
          <div class="kpi-value" id="kpiPending">—</div>
        </div>
        <div class="kpi-card blue">
          <h4>Total Users</h4>
          <div class="kpi-value" id="kpiUsers">—</div>
        </div>
        <div class="kpi-card red">
          <h4>Vendors</h4>
          <div class="kpi-value" id="kpiVendors">—</div>
        </div>
      </div>

      <!-- LISTINGS panel -->
      <section class="section-panel active" id="sectionListings">
        <h2>All Listings</h2>
        <div class="filter-bar">
          <select id="statusFilter">
            <option value="">All Statuses</option>
            <option value="pending">Pending Review</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
          <input type="text" id="listingSearch" placeholder="Search by name or location…" />
        </div>
        <div id="adminListings"><p class="empty-state">Loading…</p></div>
      </section>

      <!-- USERS panel -->
      <section class="section-panel" id="sectionUsers">
        <h2>All Users</h2>
        <div class="filter-bar">
          <select id="roleFilter">
            <option value="">All Roles</option>
            <option value="admin">Admin</option>
            <option value="vendor">Vendor</option>
            <option value="user">User</option>
          </select>
          <input type="text" id="userSearch" placeholder="Search by name or email…" />
        </div>
        <div id="adminUsers"><p class="empty-state">Loading…</p></div>
      </section>
    </main>
  </div>
</div>

<script type="module" src="../scripts/navbar.js"></script>
<script type="module" src="../scripts/auth.js"></script>
<script type="module">
  import {
    initAdminPanel,
    renderListings, bindListingActions,
    renderUsers,    bindUserActions
  } from "../scripts/admin.js";

  initAdminPanel();

  document.getElementById("statusFilter").addEventListener("change", renderListings);
  document.getElementById("listingSearch").addEventListener("input",  renderListings);
  document.getElementById("roleFilter").addEventListener("change",    renderUsers);
  document.getElementById("userSearch").addEventListener("input",     renderUsers);

  bindListingActions();
  bindUserActions();
</script>

</body>
</html>

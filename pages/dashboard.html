<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Vishvamitra</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/dashboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<!-- Auth Guard -->
<script type="module">
  import { protectPage } from "../scripts/authGuard.js";
  protectPage();
</script>

<header><div id="navbar-root"></div></header>

<div id="dashMain" style="visibility:hidden;">
  <div class="dashboard">
    <div class="welcome">Welcome, <span id="user-name">…</span></div>

    <!-- KPIs -->
    <div class="kpi-overview">
      <div class="kpi-card">
        <h4>Total Listings</h4>
        <div class="kpi-value" id="total-listings">0</div>
      </div>
      <div class="kpi-card">
        <h4>Active Listings</h4>
        <div class="kpi-value" id="active-listings">0</div>
      </div>
      <div class="kpi-card pending-kpi">
        <h4>In Review</h4>
        <div class="kpi-value" id="review-listings">0</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="dashboard-buttons">
      <button id="addListingBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add New Listing
      </button>
      <button id="homeBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </button>
    </div>

    <h2 style="margin:30px 0 15px;">Your Listings</h2>

    <div class="listings" id="listings-container">
      <div class="skeleton-card"><div class="skeleton-line skeleton-title"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>
      <div class="skeleton-card"><div class="skeleton-line skeleton-title"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>
    </div>
  </div>

  <footer class="footer">&copy; 2026 Vishvamitra. All rights reserved.</footer>
</div>

<script type="module" src="../scripts/navbar.js"></script>
<script type="module" src="../scripts/auth.js"></script>
<script type="module">
  import { initVendorDashboard, bindCardActions } from "../scripts/dashboard.js";
  import { navigate } from "../scripts/core/router.js";
  import { P } from "../scripts/core/routes.js";

  document.getElementById("addListingBtn").addEventListener("click", () => navigate(P.ADD_LISTING));
  document.getElementById("homeBtn").addEventListener("click",       () => navigate(P.HOME));

  initVendorDashboard();
  bindCardActions("listings-container");
</script>

</body>
</html>

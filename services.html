<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services | Vishvamitra</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: 'Poppins', sans-serif; margin: 0; background-color: #f9f9f9; }

    /* Filter Section */
    .filters { max-width: 1100px; margin: 40px auto 20px; padding: 0 1rem; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 1rem; }
    .filters input, .filters select { padding: 0.8rem; border: 1px solid #ccc; border-radius: 5px; font-size: 0.95rem; flex: 1; min-width: 220px; }
    .filters button { padding: 0.8rem 1.5rem; border: none; border-radius: 5px; background: #14a800; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .filters button:hover { background: #119600; }

    /* Services Section */
    .services {max-width: 1100px; margin: 20px auto 60px; padding: 0 16px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;}
   .listing-card {background: white; border-radius: 12px; box-shadow: 0 6px 16px rgba(0,0,0,0.08); padding: 20px; text-align: center; transition: 0.25s;}    .listing-card:hover { transform: translateY(-3px); }
    .listing-card h3 { color: #14a800; font-size: 1.1rem; margin-bottom: 0.3rem; }
    .listing-card p { color: #555; font-size: 0.9rem; margin: 0.3rem 0; }
    .listing-card button { background: #14a800; color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; margin-top: 0.5rem; cursor: pointer; font-weight: 500; transition: 0.3s; }
    .listing-card button:hover { background: #119600; }

    /* Footer */
    .footer { text-align: center; padding: 1rem; background: white; box-shadow: 0 -2px 5px rgba(0,0,0,0.1); color: #555; font-size: 0.9rem; }

    @media (max-width: 600px) {
      .filters { flex-direction: column; }
      .filters input, .filters select, .filters button { width: 100%; }
    }
  </style>


</head>
<body>

  <header>
    <nav class="navbar">
      <div class="logo">Vishvamitra</div>
      <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
      <ul class="nav-list">
  <li><a href="index.html" class="nav-link">Home</a></li>
  <li><a href="services.html" class="nav-link active">Services</a></li>
  <li><a href="dashboard.html" id="dashboardLink" class="nav-link" style="display:none;">Dashboard</a></li>
  <li><a href="admin.html" id="adminLink" class="nav-link" style="display:none;">Admin</a></li>
  <li><a href="contact.html" class="nav-link">Contact</a></li>
  <li><a href="login.html" id="loginLink" class="nav-link">Login</a></li>
  <li><a href="#" id="logoutLink" class="nav-link" style="display:none;">Logout</a></li>
</ul>
    </nav>
  </header>

  <div class="filters">
    <input type="text" id="search" placeholder="Search businesses...">
    <select id="category">
      <option value="">Select category</option>
      <option value="food-beverages">Food & Beverages</option>
      <option value="retail-shopping">Retail & Shopping</option>
      <option value="health-wellness">Health & Wellness</option>
      <option value="education-training">Education & Training</option>
      <option value="professional-services">Professional Services</option>
      <option value="home-garden">Home & Garden</option>
      <option value="automotive">Automotive</option>
      <option value="technology-it">Technology & IT</option>
      <option value="real-estate">Real Estate</option>
      <option value="travel-tourism">Travel & Tourism</option>
      <option value="arts-entertainment">Arts & Entertainment</option>
      <option value="financial-services">Financial Services</option>
      <option value="custom">Custom</option>
    </select>
    <button id="filterBtn">Search</button>
  </div>

  <div class="services" id="services"></div>

  <footer class="footer">
    <p>© 2025 Vishvamitra. All rights reserved.</p>
  </footer>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
import { getFirestore, collection, query, where, limit, startAfter, getDocs, orderBy } 
from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4pVmGDasFAADaiYctht55jE2NvIpHSto",
  authDomain: "vishvamitra-79627.firebaseapp.com",
  projectId: "vishvamitra-79627",
  storageBucket: "vishvamitra-79627.firebasestorage.app",
  messagingSenderId: "436224322843",
  appId: "1:436224322843:web:a4d074a5eb8ad99866f7be"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);

let lastDoc = null;
let loading = false;
let noMoreListings = false;
const PAGE_SIZE = 10;

function showSkeleton(){
  const services = document.getElementById('services');
  services.innerHTML = "";

  for(let i=0;i<6;i++){
    services.innerHTML += `
      <div class="skeleton-card">
        <div class="skeleton-line skeleton-title"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>
    `;
  }
}

async function loadListings(){

  if(loading || noMoreListings) return;
  loading = true;

  const services = document.getElementById("services");

  let q;

  if(lastDoc){
    q = query(
      collection(db,"listings"),
      where("status","==","active"),
      orderBy("name"),
      startAfter(lastDoc),
      limit(PAGE_SIZE)
    );
  }else{
    q = query(
      collection(db,"listings"),
      where("status","==","active"),
      orderBy("name"),
      limit(PAGE_SIZE)
    );
  }

  const snap = await getDocs(q);
  if(snap.empty){
  noMoreListings = true;
  return;
}

  snap.forEach(doc=>{
    const l = doc.data();

    services.innerHTML += `
      <div class="listing-card">
        <h3>${l.name}</h3>
        <p>Category: ${l.category}</p>
        <p>📍 ${l.location}</p>
        <p>☎️ ${l.phone || 'N/A'}</p>
        <p>
        <span style="background:#eee;padding:3px 8px;border-radius:6px;font-size:.85rem">
          ${(l.type || 'free').toUpperCase()}
        </span>
        </p>
        <button onclick="window.location='listing-details.html?id=${doc.id}'">
        View Details
        </button>
      </div>
    `;
  });

  if(snap.docs.length < PAGE_SIZE){
  noMoreListings = true;
}

lastDoc = snap.docs[snap.docs.length - 1];
  loading = false;
}

showSkeleton();

setTimeout(()=>{
  document.getElementById("services").innerHTML="";
  loadListings();
},500);

/* Infinite scroll */
window.addEventListener("scroll", () => {

  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){
    loadListings();
  }

});

/* Mobile menu */
const mobileMenu = document.getElementById('mobile-menu');
const navList = document.querySelector('.nav-list');
mobileMenu.addEventListener('click', () => navList.classList.toggle('active'));

/* Highlight active page */
const currentPage = window.location.pathname.split("/").pop();
document.querySelectorAll('.nav-link').forEach(link => {
  if (link.getAttribute('href') === currentPage) link.classList.add('active');
});
</script>
<script>
  const links = document.querySelectorAll("a[href$='.html']");
  links.forEach(link => {
    link.addEventListener("mouseenter", () => {
      const prefetch = document.createElement("link");
      prefetch.rel = "prefetch";
      prefetch.href = link.href;
      document.head.appendChild(prefetch);
    });
  });
</script>

  <script type="module" src="auth.js"></script>

</body>
</html>

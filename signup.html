}

    p {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #555;
    }

    a {
      color: #14a800;
      text-decoration: none;
      font-weight: 500;
    }

    .footer {
      text-align: center;
      padding: 1rem;
      background: white;
      margin-top: 60px;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
      color: #555;
      font-size: 0.9rem;
    }
  </style>
 
</head>
<body>
  <!-- Navbar -->
  <header>
    <nav class="navbar">
      <div class="logo">Vishvamitra</div>
      <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </div>
      <ul class="nav-list">
        <li><a href="index.html" class="nav-link">Home</a></li>

    </nav>

 <!-- Only showing relevant parts with fixes -->

<!-- Signup Section -->
<div class="auth-container">
  <h2>Create an Account</h2>
  <form id="signup-form">
    <label>Full Name</label>
    <input type="text" id="signupName" placeholder="Enter your name" required />
    <label>Email</label>
    <input type="email" id="signupEmail" placeholder="Enter your email" required />
    <label>Password</label>
    <input type="password" id="signupPassword" placeholder="Create a password" required />
    <button type="submit">Signup</button>
  </form>

  <button class="google-btn" id="googleSignup">
    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google" />
    Continue with Google
  </button>
  <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>


<script>
  const firebaseConfig = {
    apiKey: "AIzaSyD4pVmGDasFAADaiYctht55jE2NvIpHSto",
    authDomain: "vishvamitra-79627.firebaseapp.com",
    projectId: "vishvamitra-79627",
    storageBucket: "vishvamitra-79627.firebasestorage.app",
    messagingSenderId: "436224322843",
    appId: "1:436224322843:web:a4d074a5eb8ad99866f7be"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // Email/Password Signup
  const signupForm = document.getElementById('signup-form');
  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;

    try {
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);

      // Save user info in Firestore
      await db.collection('users').doc(userCredential.user.uid).set({
        name: name,
        email: email
      });

      alert('Signup successful!');
      window.location.href = 'dashboard.html';
    } catch (error) {
      alert(error.message);
    }
  });

  // Google Signup/Login
  const googleSignup = document.getElementById('googleSignup');
  const googleProvider = new firebase.auth.GoogleAuthProvider();

  googleSignup.addEventListener('click', async () => {
    try {
      const result = await auth.signInWithPopup(googleProvider);
      const user = result.user;

      // Save user info in Firestore (optional)
      await db.collection('users').doc(user.uid).set({
        name: user.displayName,
        email: user.email
      }, { merge: true });

      alert('Google signup/login successful!');
      window.location.href = 'dashboard.html';
    } catch (error) {
      alert(error.message);
    }
  });
</script>
  <script>
    const mobileMenu = document.getElementById('mobile-menu');
    const navList = document.querySelector('.nav-list');
    mobileMenu.addEventListener('click', () => navList.classList.toggle('active'));

    const currentPage = window.location.pathname.split("/").pop();
    document.querySelectorAll('.nav-link').forEach(link => {
      if(link.getAttribute('href') === currentPage){
        link.classList.add('active');
      }
    });
  </script>
</body>
</html>
